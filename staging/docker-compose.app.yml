# Unified app-tier staging compose (identity, crm, client, pii-vault).
# Run from repo root: docker compose -f deploy/staging/docker-compose.app.yml --env-file deploy/staging/.env.app.staging
#
# Per-service secrets still live in each */.env.staging; this file wires ports and build contexts.

services:
  identity:
    image: ${IDENTITY_IMAGE:-esafx-identity:latest}
    build:
      context: ../../identity-service
      dockerfile: Dockerfile
    container_name: esafx-identity
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../../identity-service/.env.staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  pii-vault:
    image: ${PII_VAULT_IMAGE:-esafx-pii-vault:latest}
    build:
      context: ../../pii-vault-service
      dockerfile: Dockerfile
    container_name: esafx-pii-vault
    restart: unless-stopped
    ports:
      - "8004:8004"
    env_file:
      - ../../pii-vault-service/.env.staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  crm-api:
    image: ${CRM_IMAGE:-esafx-crm:latest}
    build:
      context: ../../crm-service
      dockerfile: Dockerfile
    container_name: esafx-crm-api
    restart: unless-stopped
    ports:
      - "${CRM_PORT:-8001}:8000"
    env_file:
      - ../../crm-service/.env.staging
    depends_on:
      pii-vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  client:
    image: ${CLIENT_IMAGE:-esafx-client:latest}
    build:
      context: ../../client-service
      dockerfile: Dockerfile
    container_name: esafx-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-8002}:8000"
    env_file:
      - ../../client-service/.env.staging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  identity-migrate:
    image: ${IDENTITY_IMAGE:-esafx-identity:latest}
    build:
      context: ../../identity-service
    command: sh -c "alembic upgrade head"
    env_file:
      - ../../identity-service/.env.staging
    profiles:
      - migrate

  crm-migrate:
    image: ${CRM_IMAGE:-esafx-crm:latest}
    build:
      context: ../../crm-service
    command: sh -c "alembic upgrade head"
    env_file:
      - ../../crm-service/.env.staging
    profiles:
      - migrate

  client-migrate:
    image: ${CLIENT_IMAGE:-esafx-client:latest}
    build:
      context: ../../client-service
    command: sh -c "alembic upgrade head"
    env_file:
      - ../../client-service/.env.staging
    profiles:
      - migrate

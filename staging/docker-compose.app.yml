# Unified app-tier staging compose (identity, crm, client, pii-vault).
# Run from monorepo root: ./deploy/staging/deploy-app-ec2.sh
#
# Host: download RDS CA once to /opt/esafx/global-bundle.pem (deploy script does this).

x-rds-ca-volume: &rds-ca-volume
  - /opt/esafx/global-bundle.pem:/opt/esafx/global-bundle.pem:ro

services:
  identity:
    image: ${IDENTITY_IMAGE:-esafx-identity:latest}
    build:
      context: ../../identity-service
      dockerfile: Dockerfile
    container_name: esafx-identity
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../../identity-service/.env.staging
    volumes: *rds-ca-volume
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  pii-vault:
    image: ${PII_VAULT_IMAGE:-esafx-pii-vault:latest}
    build:
      context: ../../pii-vault-service
      dockerfile: Dockerfile
    container_name: esafx-pii-vault
    restart: unless-stopped
    ports:
      - "8004:8004"
    env_file:
      - ../../pii-vault-service/.env.staging
    volumes: *rds-ca-volume
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  audit-log:
    image: ${AUDIT_LOG_IMAGE:-esafx-audit-log:latest}
    build:
      context: ../../audit-log-service
      dockerfile: Dockerfile
    container_name: esafx-audit-log
    restart: unless-stopped
    ports:
      - "8005:8005"
    env_file:
      - ../../audit-log-service/.env.staging
    volumes: *rds-ca-volume
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  crm-api:
    image: ${CRM_IMAGE:-esafx-crm:latest}
    build:
      context: ../../crm-service
      dockerfile: Dockerfile
    container_name: esafx-crm-api
    restart: unless-stopped
    ports:
      - "${CRM_PORT:-8001}:8000"
    env_file:
      - ../../crm-service/.env.staging
    volumes:
      - /opt/esafx/global-bundle.pem:/opt/esafx/global-bundle.pem:ro
      - /opt/esafx/secrets/trading_db_password:/run/secrets/trading_db_password:ro
    depends_on:
      identity:
        condition: service_healthy
      pii-vault:
        condition: service_healthy
      audit-log:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  voip-gateway:
    image: ${VOIP_GATEWAY_IMAGE:-esafx-voip-gateway:latest}
    build:
      context: ../../voip-gateway-service
      dockerfile: Dockerfile
    container_name: esafx-voip-gateway
    restart: unless-stopped
    ports:
      - "8006:8006"
    env_file:
      - ../../voip-gateway-service/.env.staging
    volumes: *rds-ca-volume
    depends_on:
      pii-vault:
        condition: service_healthy
      audit-log:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  whatsapp-gateway:
    image: ${WHATSAPP_GATEWAY_IMAGE:-esafx-whatsapp-gateway:latest}
    build:
      context: ../../whatsapp-gateway-service
      dockerfile: Dockerfile
    container_name: esafx-whatsapp-gateway
    restart: unless-stopped
    ports:
      - "8007:8007"
    env_file:
      - ../../whatsapp-gateway-service/.env.staging
    volumes:
      - /opt/esafx/global-bundle.pem:/opt/esafx/global-bundle.pem:ro
      - /opt/esafx/data:/app/data
    depends_on:
      pii-vault:
        condition: service_healthy
      audit-log:
        condition: service_healthy
      crm-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  client:
    image: ${CLIENT_IMAGE:-esafx-client:latest}
    build:
      context: ../../client-service
      dockerfile: Dockerfile
    container_name: esafx-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-8002}:8000"
    env_file:
      - ../../client-service/.env.staging
    volumes: *rds-ca-volume
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  identity-migrate:
    image: ${IDENTITY_IMAGE:-esafx-identity:latest}
    build:
      context: ../../identity-service
    command: sh -c "python -m alembic upgrade head"
    env_file:
      - ../../identity-service/.env.staging
    volumes: *rds-ca-volume
    profiles:
      - migrate

  crm-migrate:
    image: ${CRM_IMAGE:-esafx-crm:latest}
    build:
      context: ../../crm-service
    command: sh -c "python -m alembic upgrade head"
    env_file:
      - ../../crm-service/.env.staging
    volumes: *rds-ca-volume
    profiles:
      - migrate

  client-migrate:
    image: ${CLIENT_IMAGE:-esafx-client:latest}
    build:
      context: ../../client-service
    command: sh -c "python -m alembic upgrade head"
    env_file:
      - ../../client-service/.env.staging
    volumes: *rds-ca-volume
    profiles:
      - migrate

  audit-migrate:
    image: ${AUDIT_LOG_IMAGE:-esafx-audit-log:latest}
    build:
      context: ../../audit-log-service
    command: sh -c "python -m alembic upgrade head"
    env_file:
      - ../../audit-log-service/.env.staging
    volumes: *rds-ca-volume
    profiles:
      - migrate

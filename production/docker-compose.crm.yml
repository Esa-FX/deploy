# Production CRM tier: crm-api + client-service
# Inter-service URLs use core EC2 private IP (not Docker DNS across hosts).

x-rds-ca-volume: &rds-ca-volume
  - /opt/esafx/global-bundle.pem:/opt/esafx/global-bundle.pem:ro

services:
  crm-api:
    image: ${CRM_IMAGE:-esafx-crm:latest}
    build:
      context: ../../crm-service
      dockerfile: Dockerfile
    container_name: esafx-crm-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - ../../crm-service/.env.production
    volumes:
      - /opt/esafx/global-bundle.pem:/opt/esafx/global-bundle.pem:ro
      - /opt/esafx/secrets/trading_db_password:/run/secrets/trading_db_password:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  client:
    image: ${CLIENT_IMAGE:-esafx-client:latest}
    build:
      context: ../../client-service
      dockerfile: Dockerfile
    container_name: esafx-client
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - ../../client-service/.env.production
    volumes: *rds-ca-volume
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  client-migrate:
    image: ${CLIENT_IMAGE:-esafx-client:latest}
    build:
      context: ../../client-service
    command: sh -c "python -m alembic upgrade head"
    env_file:
      - ../../client-service/.env.production
    volumes: *rds-ca-volume
    profiles:
      - migrate
